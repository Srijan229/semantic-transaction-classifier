services:
  - type: web
    name: semantic-transaction-classifier-api
    runtime: node
    rootDir: semantic-transaction-classifier-backend
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: semantic-transaction-classifier-db
          property: connectionString
      - key: AI_PROVIDER_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: semantic-transaction-classifier-db
